name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TINYGO_VERSION: '0.39.0'
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install TinyGo
        run: |
          curl -fsSL "https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb" -o /tmp/tinygo.deb
          sudo dpkg -i /tmp/tinygo.deb
          tinygo version

      - name: Validate release tag
        run: |
          PLUGIN_VERSION="$(jq -r '.version' plugin.json)"
          EXPECTED_TAG="v${PLUGIN_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match plugin.json version ${PLUGIN_VERSION} (${EXPECTED_TAG})." >&2
            exit 1
          fi

      - name: Build plugin release assets
        run: make package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            plugin_dist/*.tar.gz
            plugin_dist/SHA256SUMS
          draft: false
          prerelease: false
